services:
  db:
    image: postgres:16-alpine
    container_name: roadmapstrix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roadmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadmap}
      POSTGRES_DB: ${POSTGRES_DB:-roadmapstrix}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roadmap} -d ${POSTGRES_DB:-roadmapstrix}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: roadmapstrix_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-roadmap}:${POSTGRES_PASSWORD:-roadmap}@db:5432/${POSTGRES_DB:-roadmapstrix}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
